name: Principio Stocks - Daily Update

on:
  # Ejecutar automáticamente cada día a las 9:00 AM UTC
  schedule:
    - cron: '0 9 * * *'
  
  # Permitir ejecución manual desde GitHub
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 3. Cache de dependencias
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      # 4. Instalar dependencias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-firebase.txt  # o solo requirements.txt si unificaste
      
      # 5. Crear archivos de configuración desde Secrets
      - name: Setup Google Service Account
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_CREDS" > principios.json
      
      - name: Setup Firebase Service Account
        env:
          FIREBASE_CREDS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_CREDS" > firebase-service-key.json
      
      # 6. Crear archivo .env con API keys
      - name: Setup environment variables
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: |
          cat > .env << EOF
          ALPHA_VANTAGE_KEY=$ALPHA_VANTAGE_KEY
          FMP_KEY=$FMP_KEY
          FINNHUB_KEY=$FINNHUB_KEY
          EOF
      
      # 7. Ejecutar el script principal
      - name: Run main.py
        run: |
          python main.py
      
      # 8. Subir logs como artefactos (opcional, para debugging)
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: |
            *.log
            output/
      
      # 9. Deploy frontend a GitHub Pages (opcional)
      # Descomenta si quieres hostear el HTML/JS/CSS en GitHub Pages
      # - name: Deploy to GitHub Pages
      #   if: github.ref == 'refs/heads/main'
